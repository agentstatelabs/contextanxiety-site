# CI for ContextAnxiety-site (static site — no build step)
stages:
  - check

verify:
  stage: check
  image: alpine:latest
  script:
    - 'test -f index.html && echo "ContextAnxiety-site index.html present"'
# --- added by batch-publish-sites: leak-scan-gated publish to GitHub ---
# Uses reserved stage .post (no need to touch the existing stages list).
# Requires CI vars GITHUB_REPO, GITHUB_TOKEN, and file-var LEAKSCAN_LOCAL.
publish-github:
  stage: .post
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $GITHUB_REPO'
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git bash grep curl
  script:
    - printf '%s' "$LEAKSCAN_LOCAL" > .leakscan.local
    - chmod +x scripts/leak-scan.sh scripts/publish-to-github.sh
    - ./scripts/publish-to-github.sh
# ci-guard: guarantees a NON-EMPTY pipeline and fails loudly if the publish
# prerequisites are missing. Without this, a mis-scoped publish job produces
# no pipeline at all — silent, and easy to miss for days.
ci-guard:
  stage: build
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "pipeline ran for $CI_COMMIT_SHORT_SHA on $CI_COMMIT_BRANCH"
    - |
      if [ -z "$GITHUB_REPO" ]; then
        echo "ERROR: GITHUB_REPO unset -> publish-github will NOT run"; exit 1
      fi
      echo "publish-github target: $GITHUB_REPO"
